traefik:
  traefik:
    deployment:
      kind: DaemonSet
    ports:
      web:
        port: 8000
        hostPort: 80
      websecure:
        port: 8443
        hostPort: 443

opensearch:
  opensearch:
    singleNode: true
    resources:
      requests:
        memory: 1Gi
        cpu: 500m

open-webui:
  open-webui:
    ingress:
      enabled: true
      host: ''
